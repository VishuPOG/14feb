<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matter Message</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #000000, #1a1a1a);
            font-family: Arial, sans-serif;
        }

        .box {
            text-align: center;
            padding: 40px 60px;
            border: 2px solid #ff4444;
            border-radius: 12px;
            background: rgba(0,0,0,0.7);
            box-shadow: 0 0 20px rgba(255,68,68,0.6);
        }

        h1 {
            color: #ff4444;
            font-size: 42px;
            letter-spacing: 2px;
        }

        p {
            color: #ffffff;
            font-size: 18px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Matter karna hai toh akele me mil</h1>
    <p>Baatein sabke saamne nahi hoti.</p>
</div>

</body>
</html>
